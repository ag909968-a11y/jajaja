<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee?</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Keep being yourself.</h1>
    <h2>You up for coffee? ☕</h2>

    <button class="primary" onclick="location.href='page4.html'">Yes</button>
    <button class="secondary" id="moveBtn">Maybe</button>
    <button class="secondary" id="moveBtn2">No</button>
</div>

<script>
function makeMove(id){
    const btn = document.getElementById(id);
    btn.addEventListener("mouseover", () => {
        const maxX = window.innerWidth - btn.offsetWidth - 20;
        const maxY = window.innerHeight - btn.offsetHeight - 20;
        btn.style.position = "fixed";
        btn.style.left = Math.random() * maxX + "px";
        btn.style.top = Math.random() * maxY + "px";
    });
}

makeMove("moveBtn");
makeMove("moveBtn2");
</script>

</body>
</html>
